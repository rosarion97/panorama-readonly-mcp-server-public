version: "2"
registry:
  panorama-readonly:
    name: Panorama Read-Only
    description: Query a Palo Alto Networks Panorama management server in read-only mode using the PAN-OS XML API. Retrieve system info, managed devices, security policies, logs, reports, and more — without making any configuration changes. Not affiliated with or endorsed by Palo Alto Networks.
    categories:
      - security
      - network
      - monitoring
    image: panorama-readonly-mcp-server:latest
    secrets:
      - name: PANORAMA_HOST
        env: PANORAMA_HOST
        required: true
        description: Hostname or IP of the Panorama management server
      - name: PANORAMA_API_KEY
        env: PANORAMA_API_KEY
        required: true
        description: PAN-OS API key (generate out of band via curl with type=keygen)
      - name: PANORAMA_VERIFY_SSL
        env: PANORAMA_VERIFY_SSL
        required: false
        description: TLS verification — "yes" (default) for production, "no" only for self-signed lab certs
